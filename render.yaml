services:
  - type: worker
    name: davocaleatesto-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: BOT_USERNAME
        value: davocaleatesto_bot
      - key: SALES_URL
        value: https://paypal.me/PaoloSempio
      - key: WHISPER_MODEL
        value: medium
      - key: WHISPER_LANGUAGE
        value: it
      - key: WHISPER_PROMPT
        value: Paolo, Irene, Ratanà, Copenaghen
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1
